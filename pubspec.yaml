name: ebook_converter
description: A powerful TXT to EPUB converter for iOS with modern UI and advanced features
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  archive: ^3.6.1
  path_provider: ^2.1.3
  file_picker: ^8.0.3
  permission_handler: ^11.3.1
  share_plus: ^10.0.2
  image: ^4.2.0
  shared_preferences: ^2.2.3
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  path: ^1.9.0
  xml: ^6.5.0
  csslib: ^0.17.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true

flutter_icons:
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true