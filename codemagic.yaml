# Codemagic 配置文件
# 自动编译 Flutter iOS 应用
# 详细说明：https://docs.codemagic.io/yaml-basic-configuration/yaml-getting-started/

workflows:
  flutter-ios-build:
    name: Flutter iOS Build
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.yiyuqiao.ebookconverter" # 已配置正确的Bundle ID
        # 注意：以下变量需要你在Codemagic控制台中自己添加加密变量
        # 不要直接复制其他项目的Encrypted(...)值，每个团队的加密密钥不同
        # APP_STORE_CONNECT_ISSUER_ID: （在Codemagic控制台中添加）
        # APP_STORE_CONNECT_KEY_IDENTIFIER: （在Codemagic控制台中添加）
        # APP_STORE_CONNECT_PRIVATE_KEY: （在Codemagic控制台中添加）
        # CERTIFICATE_PRIVATE_KEY: （在Codemagic控制台中添加）
    scripts:
      - name: Install Flutter dependencies
        script: |
          flutter pub get
      - name: Verify Flutter configuration
        script: |
          flutter doctor
          flutter --version
      - name: Regenerate iOS project files (fix Xcode compatibility)
        script: |
          # Recreate iOS project files compatible with current Xcode version
          flutter create --platforms=ios --overwrite .
      - name: Build iOS archive
        script: |
          # 未配置签名时使用此命令构建未签名IPA（仅用于测试构建流程）
          flutter build ipa --release --no-codesign \
            --build-name=2.0.0 --build-number=1
      - name: Export unsigned IPA from archive
        script: |
          # 创建IPA输出目录
          mkdir -p build/ios/ipa
          # 先创建导出选项文件（解决权限问题）
          cat > /tmp/exportOptions.plist << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>method</key>
  <string>development</string>
  <key>signingStyle</key>
  <string>manual</string>
  <key>signingCertificate</key>
  <string>-</string>
  <key>teamID</key>
  <string>PLACEHOLDER_TEAM_ID</string>
</dict>
</plist>
EOF
          # 手动导出未签名IPA
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/exportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - 358420938@qq.com # 已替换为你的邮箱
        notify:
          success: true
          failure: true
      # 注意：App Store Connect自动上传需要先配置加密变量
      # 请先在Codemagic控制台添加相关变量后再启用以下配置
      # app_store_connect:
      #   api_key: $APP_STORE_CONNECT_PRIVATE_KEY
      #   key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
      #   issuer_id: $APP_STORE_CONNECT_ISSUER_ID
      #   submit_to_testflight: true

# 快速开始指南：
# 1. 将此文件命名为 codemagic.yaml 放在项目根目录
# 2. 推送到你的 GitHub/GitLab 仓库
# 3. 在 Codemagic 控制台导入项目
# 4. 无需额外配置，自动识别此配置文件开始构建
